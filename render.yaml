databases:
  - name: varyanails-db
    plan: free

services:
  - type: web
    name: varyanails-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api
    envVars:
      - key: STORAGE_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: varyanails-db
          property: connectionString
      - key: API_PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://varyanails-web.onrender.com
      - key: MASTER_TELEGRAM_IDS
        value: 872647068
      - key: ALLOW_DEV_AUTH
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  - type: web
    name: varyanails-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://varyanails-api.onrender.com
