services:
  postgres:
    image: postgres:16
    container_name: varyanails-postgres
    environment:
      POSTGRES_DB: varyanails
      POSTGRES_USER: varyanails
      POSTGRES_PASSWORD: varyanails
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: varyanails-api
    env_file:
      - .env
    environment:
      API_PORT: "4000"
      STORAGE_DRIVER: "postgres"
      DATABASE_URL: "postgres://varyanails:varyanails@postgres:5432/varyanails"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./server/.data/uploads:/app/server/.data/uploads

  caddy:
    image: caddy:2
    container_name: varyanails-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
