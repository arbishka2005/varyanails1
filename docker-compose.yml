services:
  postgres:
    image: postgres:16
    container_name: varyanails-postgres
    environment:
      POSTGRES_DB: varyanails
      POSTGRES_USER: varyanails
      POSTGRES_PASSWORD: varyanails
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: varyanails-api
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./server/.data/uploads:/data/uploads
    depends_on:
      - postgres

volumes:
  postgres-data:
