app = "varyanails-api"

[build]
  dockerfile = "Dockerfile"

[env]
  API_PORT = "8080"
  STORAGE_DRIVER = "file"
  FILE_STORAGE_PATH = "/data/dev-db.json"
  UPLOADS_DIR = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "data"
  destination = "/data"
